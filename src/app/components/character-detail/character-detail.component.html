<ion-header>
  <ion-toolbar>
    <ion-title>{{ character?.name }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<!-- Botón flotante X para cerrar -->
<button class="close-fab" (click)="dismiss()" aria-label="Cerrar">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
    <line x1="18" y1="6" x2="6" y2="18" />
    <line x1="6" y1="6" x2="18" y2="18" />
  </svg>
</button>

<ion-content class="ion-padding" *ngIf="character">
  <div class="character-hero">
    <img [src]="character.image" [alt]="character.name" class="character-image" />

    <div class="character-name">{{ character.name }}</div>

    <div class="status-row">
      <ion-chip [style.--background]="getStatusColor(character.status) + '22'"
                [style.--color]="getStatusColor(character.status)"
                [style.border-color]="getStatusColor(character.status)"
                style="border: 1px solid;">
        <span [style.color]="getStatusColor(character.status)">&#9679;</span>&nbsp;{{ character.status }}
      </ion-chip>
      <ion-chip>{{ character.species }}</ion-chip>
      <ion-chip *ngIf="character.type">{{ character.type }}</ion-chip>
    </div>

    <ion-button fill="clear" (click)="toggleFavorito()" class="fav-button">
      <ion-icon
        name="star"
        [style.color]="esFavorito() ? '#FFD700' : '#888888'"
        style="font-size: 2rem;"
        slot="icon-only">
      </ion-icon>
    </ion-button>
  </div>

  <ion-list lines="none" class="detail-list">
    <ion-item>
      <ion-icon name="male-female" slot="start" class="icon-gender"></ion-icon>
      <ion-label>
        <p>G&eacute;nero</p>
        <strong>{{ character.gender }}</strong>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="planet" slot="start" class="icon-origin"></ion-icon>
      <ion-label>
        <p>Origen</p>
        <strong>{{ character.origin?.name }}</strong>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="location" slot="start" class="icon-location"></ion-icon>
      <ion-label>
        <p>&Uacute;ltima ubicaci&oacute;n</p>
        <strong>{{ character.location?.name }}</strong>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="film" slot="start" class="icon-episodes"></ion-icon>
      <ion-label>
        <p>Apariciones</p>
        <strong>{{ character.episode?.length }} episodios</strong>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
